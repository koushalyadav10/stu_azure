<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Student Management System — Track, analyze, and manage student records with ease.">
  <title>Student Management System</title>

  <!-- Preconnect to fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f5a623'/><text x='50%' y='56%' dominant-baseline='middle' text-anchor='middle' font-size='18' font-weight='700' font-family='sans-serif' fill='%230a0a0f'>S</text></svg>">
</head>
<body>
  <!-- Mount point for the entire SPA -->
  <div id="app">
    <!-- Loading screen shown before JS takes over -->
    <div style="
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      flex-direction: column;
      gap: 20px;
    ">
      <div style="
        width: 56px;
        height: 56px;
        background: #f5a623;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        color: #0a0a0f;
        font-family: sans-serif;
      ">S</div>
      <div style="
        width: 36px;
        height: 36px;
        border: 3px solid rgba(245,166,35,0.2);
        border-top-color: #f5a623;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
